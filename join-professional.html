<!DOCTYPE html>
<html>
  <head>
    <title>Join as a Professional - PLUS Healthcare</title>
  </head>
  <body>
    <div class="page-wrapper">
       <div class="header-section">
        <h1>Join as a Medical Professional</h1>
        <p>Apply to join the PLUS Healthcare provider network.</p>
      </div>
   
    <form action="#" method="POST">
      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Full Name" required>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Email Address" required>
        </div>
        
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="Phone Number" required>
        </div>
      </div>

      <div class="form-group">
        <label for="specialty">Medical Specialty</label>
        <select id="specialty" name="specialty" required>
          <option value="" disabled selected>Select your specialty...</option>
          <option value="general">General Practitioner</option>
          <option value="pediatrics">Pediatrics</option>
          <option value="cardiology">Cardiology</option>
          <option value="emergency">Emergency Medicine</option>
          <option value="nursing">Registered Nurse</option>
        </select>
      </div>

      <div class="form-group">
        <label for="license">Medical Licence / Certification Number</label>
        <input type="text" id="license" name="license" placeholder="License no." required>
      </div>

      <button type="submit" class="submit-btn">Submit Application</button>
    </form>

    <a href="index.html" class="back-link">Back to Homepage</a>
    </div>
  </body>
</html>
