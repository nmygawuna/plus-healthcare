<!DOCTYPE html>
<html>
  <head>
    <title>Join as a Professional - PLUS Healthcare</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: #f4faff;
        color: #2d3748;
        line-height: 1.6;
        padding: 20px;
      }

      .page-wrapper {
        max-width: 600px;
        margin: 60px auto;
        background: #ffffff;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      }

      .header-section {
        text-align: center;
        margin-bottom: 35px;
      }

      .header-section h1{
        color: #00695c;
        font-size: 28px;
        margin-bottom: 10px;
      }

      .header-section p {
        color: #718096;
        font-size: 16px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 14px;
        color: #2d3748;
      }

      .form-group input,
      .form-group select {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 15px;
        color: #2d3748;
        transition: all 0.3s ease;
        background-color: #fafafa;
      }

      .form-group input:focus,
      .form-group select:focus {
        outline: none;
        border-color: #00695c;
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(0, 105, 92, 0.1);
      }

      .form-row{
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .submit-btn {
        width: 100%;
        background-color: #00695c;
        color: #ffffff;
        border: none;
        padding: 14px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.2s ease, tranform 0.1s ease;
        margin-top: 10px;
      }

      .submit-btn:hover {
        bacground-color: #004d40;
      }

      .submit-btn:active {
        transform: scale(0.98);
      }

      .back-link {
        display: block;
        text-align: center;
        margin-top: 25px;
        color: #007a87;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
      }

      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
       <div class="header-section">
        <h1>Join as a Medical Professional</h1>
        <p>Apply to join the PLUS Healthcare provider network.</p>
      </div>
   
    <form action="success.html" method="GET">
      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Full Name" required>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Email Address" required>
        </div>
        
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="Phone Number" required>
        </div>
      </div>

      <div class="form-group">
        <label for="specialty">Medical Specialty</label>
        <select id="specialty" name="specialty" required>
          <option value="" disabled selected>Select your specialty...</option>
          <option value="general">General Practitioner</option>
          <option value="pediatrics">Pediatrics</option>
          <option value="cardiology">Cardiology</option>
          <option value="emergency">Emergency Medicine</option>
          <option value="nursing">Registered Nurse</option>
        </select>
      </div>

      <div class="form-group">
        <label for="license">Medical Licence / Certification Number</label>
        <input type="text" id="license" name="license" placeholder="License no." required>
      </div>

      <button type="submit" class="submit-btn">Submit Application</button>
    </form>

    <a href="index.html" class="back-link">Back to Homepage</a>
    </div>
  </body>
</html>
