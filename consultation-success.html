<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting... - PLUS Healthcare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #F4FAFF;
            color: #2D3748;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .connecting-card {
            background: #ffffff;
            max-width: 450px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        /* --- PULSING LOADING RING --- */
        .pulse-box {
            width: 90px;
            height: 90px;
            background-color: rgba(0, 105, 92, 0.1);
            color: #00695C;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 24px auto;
            position: relative;
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 105, 92, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(0, 105, 92, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 105, 92, 0); }
        }

        h1 {
            color: #00695C;
            font-size: 24px;
            margin-bottom: 12px;
        }

        p {
            color: #718096;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .disconnect-btn {
            display: inline-block;
            background-color: #D32F2F; /* Red to exit the call safely */
            color: #ffffff;
            text-decoration: none;
            padding: 14px 24px;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
            border: none;
            cursor: pointer;
        }

        .disconnect-btn:hover {
            background-color: #B71C1C;
        }
    </style>
</head>
<body>

    <div class="connecting-card">
        <div class="pulse-box">📞</div>
        
        <h1>Connecting to Secure Room...</h1>
        <p>Dr. Vance is reviewing your medical intake notes. Your encrypted video connection will initialize automatically in just a moment. Please ensure your camera and microphone are toggled on.</p>
        
        <a href="index.html" class="disconnect-btn">Cancel Call Request</a>
    </div>

</body>
</html>
