<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting... - PLUS Healthcare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #F4FAFF;
            color: #2D3748;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .connecting-card {
            background: #ffffff;
            max-width: 450px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        /* Pulsing ring animation */
        .pulse-box {
            width: 90px;
            height: 90px;
            background-color: rgba(0, 105, 92, 0.1);
            color: #00695C;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 24px auto;
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 105, 92, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(0, 105, 92, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 105, 92, 0); }
        }

        h1 {
            color: #00695C;
            font-size: 24px;
            margin-bottom: 12px;
        }

        p {
            color: #718096;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .disconnect-btn {
            display: inline-block;
            background-color: #D32F2F;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 24px;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
            border: none;
            cursor: pointer;
            text-align: center;
        }

        .disconnect-btn:hover {
            background-color: #B71C1C;
        }
    </style>
</head>
<body>

    <div class="connecting-card">
        <div class="pulse-box" id="status-icon">📞</div>
        <h1 id="status-heading">Connecting to Secure Room...</h1>
        <p id="status-text">Dr. Vance is reviewing your medical intake notes. Your encrypted connection will initialize automatically in just a moment.</p>
        
        <a href="index.html" class="disconnect-btn" id="cancel-btn">Cancel Request</a>
    </div>

    <script>
        // 1. Grab the URL data parameters sent from the form
        const urlParams = new URLSearchParams(window.location.search);
        const meetingMethod = urlParams.get('channel'); // Gets "video", "voice", or "chat"

        // 2. Select the HTML text items we want to change
        const iconBox = document.getElementById('status-icon');
        const heading = document.getElementById('status-heading');
        const text = document.getElementById('status-text');
        const cancelBtn = document.getElementById('cancel-btn');

        // 3. Check what option the user picked and rewrite the page elements dynamically
        if (meetingMethod === 'chat') {
            iconBox.textContent = '💬';
            heading.textContent = 'Opening Secure Chat Room...';
            text.textContent = 'Dr. Vance is reviewing your intake details. Your encrypted live text chat portal will launch automatically in just a moment. Please type your primary concerns inside the chat feed.';
            cancelBtn.textContent = 'Leave Chat Room';
        } else if (meetingMethod === 'voice') {
            iconBox.textContent = '🔊';
            heading.textContent = 'Initializing Audio Call...';
            text.textContent = 'Dr. Vance is connecting to your audio stream. Please make sure your microphone permissions are enabled on your device.';
            cancelBtn.textContent = 'End Audio Call';
        }
        // If it is 'video', it defaults to the original setup code we wrote earlier!
    </script>

</body>
</html>
