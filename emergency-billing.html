<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Invoice - PLUS Healthcare</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #F4FAFF;
            color: #2D3748;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .invoice-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #2D3748;
        }

        .receipt-summary {
            background-color: #F7FAFC;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .line-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            color: #718096;
        }

        .line-item.total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #E2E8F0;
            font-size: 18px;
            font-weight: 700;
            color: #2D3748;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #E2E8F0;
            border-radius: 6px;
            font-size: 15px;
        }

        .pay-btn {
            width: 100%;
            background-color: #00695C; /* Back to your trust green palette */
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .pay-btn:hover {
            background-color: #004D40;
        }
    </style>
</head>
<body>

    <div class="invoice-card">
        <h2>Emergency Incident Invoice</h2>
        
        <div class="receipt-summary">
            <div class="line-item">
                <span>Priority Service Routing</span>
                <span>Included</span>
            </div>
            <div class="line-item">
                <span>ALS Ambulance Dispatch</span>
                <span>$150.00</span>
            </div>
            <div class="line-item total">
                <span>Total Due:</span>
                <span>$150.00</span>
            </div>
        </div>

        <form action="success.html" method="GET">
            <div class="form-group">
                <label for="card">Card Number</label>
                <input type="text" id="card" placeholder="4111 •••• •••• ••••" required>
            </div>
            <button type="submit" class="pay-btn">Authorize One-Time Charge</button>
        </form>
    </div>

</body>
</html>
