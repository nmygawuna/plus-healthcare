<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Application Received - PLUS Healthcare</title>
    <script src="https://kit.fontawesome.com/999aaab8bd.js" crossorigin="anonymous"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: #f4faff;
        color: #2d3748;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      .success-card {
        background: #ffffff;
        max-width: 450px;
        width: 100%;
        padding: 40px 30px;
        border-radius: 16px;
        box-shadow: 0 10px 25px  rgba(0, 0, 0, 0.05);
        text-align: center;
      }

      .icon-box {
        width: 80px;
        height: 80px;
        background-color: rgba(0, 105, 92, 0.1);
        color: #00695c;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        margin: 0 auto 24px auto;
      }

      h1 {
        color: #00695c;
        font-size: 24px;
        margin-bottom: 12px;
      }

      p {
        color: #718096;
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      .home-btn {
            display: inline-block;
            background-color: #00695C;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .home-btn:hover {
            background-color: #004D40;
            transform: translateY(-1px);
        }

        .home-btn:active {
            transform: translateY(0);
        }
    </style>
  </head>
  <body>
    <div class="success-card">
      <div class="icon-box"><i class="fa-solid fa-check"></i></div>

      <h1>Application Submitted!</h1>
      <p>Thank you for applying to the PLUS Healthcare provider network. Our medical credentialing board will review your license details and get back to you via email  within 3 to 5 business days.</p>

      <a href="index.html" class="home-btn">Return to Homepage</a>
      
      </div>
    </div>
  </body>
</html>
