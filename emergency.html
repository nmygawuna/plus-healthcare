<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Dispatch - PLUS Healthcare</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #FFEBEE; /* Light emergency coral/red tint */
            color: #2D3748;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .emergency-box {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(211, 47, 47, 0.1);
            border: 2px solid #FFCDD2;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        h1 {
            color: #C62828;
            font-size: 26px;
            font-weight: 700;
        }

        p {
            color: #718096;
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 2px solid #E2E8F0;
            background-color: #FAFAFA;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #D32F2F;
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1);
            background-color: #fff;
        }

        .pricing-notice {
            background-color: #FFF5F5;
            border: 1px dashed #FEB2B2;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pricing-text span {
            display: block;
            font-size: 12px;
            color: #718096;
        }

        .pricing-text strong {
            color: #C62828;
            font-size: 14px;
        }

        .price-tag {
            font-size: 22px;
            font-weight: 800;
            color: #D32F2F;
        }

        .dispatch-btn {
            width: 100%;
            background-color: #D32F2F;
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .dispatch-btn:hover {
            background-color: #B71C1C;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #718096;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="emergency-box">
        <div class="header">
            <div class="icon">🚨</div>
            <h1>Emergency Dispatch</h1>
            <p>Help us identify the situation so our medical team can prepare.</p>
        </div>

        <form action="emergency-billing.html" method="GET">
            <div class="form-group">
                <label for="emergency-type">Type of Medical Emergency</label>
                <select id="emergency-type" name="emergency-type" required>
                    <option value="" disabled selected>Select emergency type...</option>
                    <option value="accident">Road Accident</option>
                    <option value="cardiac">Severe Chest Pain / Cardiac</option>
                    <option value="respiratory">Breathing Difficulty / Asthma</option>
                    <option value="trauma">Severe Injury / Physical Trauma</option>
                    <option value="allergic">Severe Allergic Reaction (Anaphylaxis)</option>
                    <option value="other">Other Urgent Medical Crisis</option>
                </select>
            </div>

            <div class="form-group">
                <label for="location">Current Location / Address</label>
                <input type="text" id="location" name="location" placeholder="Enter street address or apartment number" required>
            </div>

            <div class="pricing-notice">
                <div class="pricing-text">
                    <strong>One-Time Incident Fee</strong>
                    <span>Independent of monthly subscription</span>
                </div>
                <div class="price-tag">$150</div>
            </div>

            <button type="submit" class="dispatch-btn">Confirm & Dispatch Team</button>
            <a href="index.html" class="back-link">Cancel and Go Back</a>
        </form>
    </div>

</body>
</html>
