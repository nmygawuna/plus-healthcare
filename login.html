<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Sign Up - PLUS Healthcare</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				background-color: #f4faff;
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				color: #2d3748;
				display: flex;
				justify-content: center;
				align-items: center;
				min-height: 100vh;
				padding: 40px 20px;
			}

			.form-containers {
				width: 100%;
				max-width: 520px;
				padding: 40px;
				border-radius: 16px;
				background-color: #ffffff; /* Gives the form a clean white card background */
				box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
			}

			.logoh1 {
				display: flex; 
				align-items: center;
				gap: 12px;
				margin-bottom: 8px;
			}

			.logo {
				width: auto;
				height: 36px;
			}
			
			.title {
				color: #00695c;
				font-size: 28px;
				font-weight: 700;
			}

			.wellcome {
				margin-bottom: 30px;
				color: #718096;
				font-size: 15px;
			}

			.form-group {
				margin-bottom: 20px;
			}

			label {
				display: block;
				font-weight: 600;
				margin-bottom: 8px;
				font-size: 14px;
				color: #2d3748;
			}

			input {
				width: 100%;
				padding: 12px;
				border-radius: 8px;
				border: 2px solid #e2e8f0;
				font-size: 15px;
				color: #2d3748;
				background-color: #fafafa;
				transition: all 0.3s ease;
				outline: none;
			}

			/* Interactive glow when user clicks into a field */
			input:focus {
				border-color: #00695c;
				background-color: #ffffff;
				box-shadow: 0 0 0 3px rgba(0, 105, 92, 0.1);
			}

			/* The side-by-side row fix */
			.name-row {
				display: grid;
				grid-template-columns: 1fr 1fr 1fr; /* Splitting names into 3 equal columns */
				gap: 12px;
				margin-bottom: 20px;
			}

			/* Resets margin for groups inside a row container */
			.name-row .form-group {
				margin-bottom: 0;
			}

			.button {
				width: 100%;
				margin: 10px 0;
				cursor: pointer;
				font-size: 16px;
				font-weight: 600;
				background-color: #00695c;
				color: white;
				border-radius: 8px;
				padding: 14px; /* Perfectly centered, readable padding */
				border: none;
				transition: background-color 0.2s ease;
			}

			.button:hover {
				background-color: #004d40;
			}

			.back-link {
				display: block;
				text-align: center;
				margin-top: 20px;
				color: #007a87;
				text-decoration: none;
				font-size: 14px;
				font-weight: 500;
			}

			.back-link:hover {
				text-decoration: underline;
			}
		</style>
	</head>
	<body>
		<div class="form-containers">
			<div class="logoh1">
				<img class="logo" src="logo.png" alt="logo">
				<h1 class="title">Sign In</h1>
			</div>
			<p class="wellcome">Welcome! Let's create your account.</p>
			
			<form action="success.html" method="GET">
				<div class="name-row">
					<div class="form-group">
						<label for="firstname">First Name</label>
						<input type="text" id="firstname" name="firstname" required>
					</div>
					<div class="form-group">
						<label for="middlename">Middle Name</label>
						<input type="text" id="middlename" name="middlename">
					</div>
					<div class="form-group">
						<label for="surname">Surname</label>
						<input type="text" id="sirname" name="sirname" required>
					</div>
				</div>
				
				<div class="form-group">
					<label for="age">Age</label>
					<input type="number" id="age" name="age" required>
				</div>
				<div class="form-group">
					<label for="city">City</label>
					<input type="text" id="city" name="city" required>
				</div>
				<div class="form-group">
					<label for="phonenumber">Phone Number</label>
					<input type="tel" id="phonenumber" name="phonenumber" required>
				</div>
				<div class="form-group">
					<label for="email">Email</label>
					<input type="email" id="email" name="email" required>
				</div>
				<div class="form-group">
					<label for="password">Password</label>
					<input type="password" id="password" name="password" required>
				</div>

				<button class="button" type="submit">Submit Application</button>
				<a href="index.html" class="back-link">Back to Homepage</a>
			</form>
		</div>
	</body>
</html>
