<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment-info</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', sans-serif;
      background: #f0f5f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .payment-container {
      max-width: 450px;
      width: 100%;
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }
    .payment-inner {
      padding: 2rem 2rem 2rem;
    }
    .header {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0b6e4f, #1c8b6e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .header p {
      color: #558b7c;
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }
    .bank-card {
      background: #f8fdfb;
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid #d8e9ef;
      margin-bottom: 1.5rem;
    }
    .bank-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #115e59;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #e0ecef;
    }
    .bank-details {
      background: white;
      padding: 1rem;
      border-radius: 1rem;
    }
    .detail-row {
      margin: 0.8rem 0;
      font-size: 1rem;
    }
    .detail-label {
      font-weight: 700;
      color: #0f766e;
      width: 120px;
      display: inline-block;
    }
    .detail-value {
      color: #1a3a3a;
      font-weight: 500;
    }
    .note {
      font-size: 0.7rem;
      color: #86aca0;
      text-align: center;
      margin-top: 1rem;
    }
    .button-stack {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin: 1rem 0 1rem 0;
    }
    .complete-btn {
      background: #0f766e;
      border: none;
      padding: 0.9rem 1rem;
      border-radius: 60px;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      text-decoration: none;
      display: block;
      width: 100%;
    }
    .cancel-btn {
      background: #dee9ed;
      border: none;
      padding: 0.9rem 1rem;
      border-radius: 60px;
      color: #1a5c55;
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      text-decoration: none;
      display: block;
      width: 100%;
    }
    .complete-btn:hover {
      background: #0a5c55;
    }
    .cancel-btn:hover {
      background: #cfe0e6;
    }
    .footer-link {
      text-align: center;
      margin-top: 1.2rem;
      padding-top: 1rem;
      border-top: 1px solid #e0ecef;
    }
    .back-link {
      color: #558b7c;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .back-link:hover {
      color: #0f766e;
    }
  </style>
</head>
<body>
<div class="payment-container">
  <div class="payment-inner">
    <div class="header">
      <h1>PLUS HEALTHCARE</h1>
      <p>complete your payment</p>
    </div>
    <div class="bank-card">
      <div class="bank-title">
        🏦 Bank Transfer Details
      </div>
      <div class="bank-details">
        <div class="detail-row">
          <span class="detail-label">Bank:</span>
          <span class="detail-value">coming soon</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Account Name:</span>
          <span class="detail-value">PLUS HEALTHCARE Ltd</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Account Number:</span>
          <span class="detail-value">XXXX-XXXX-XXXX</span>
        </div>
      </div>
      <div class="note">
        Transfer the exact amount and click Complete
      </div>
    </div>
    <div class="button-stack">
      <a href="#" class="complete-btn">Complete Payment</a>
      <a href="#" class="cancel-btn">Cancel / Go Back</a>
    </div>
  </div>
</div>
</body>
</html>
