<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispatch Confirmed - PLUS Healthcare</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #FFEBEE; /* Light emergency tint */
            color: #2D3748;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .success-card {
            background: #ffffff;
            max-width: 450px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 2px solid #FFCDD2;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background-color: rgba(211, 47, 47, 0.1); /* Soft red tint */
            color: #D32F2F; /* Emergency red */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px auto;
        }

        h1 {
            color: #D32F2F;
            font-size: 24px;
            margin-bottom: 12px;
        }

        p {
            color: #4A5568;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .home-btn {
            display: inline-block;
            background-color: #D32F2F;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .home-btn:hover {
            background-color: #B71C1C;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-box">🚨</div>
        
        <h1>Dispatch Activated!</h1>
        <p>Your payment has been authorized, and an emergency medical team has been deployed to your location. Please remain calm and keep your phone line open for the incoming dispatcher call.</p>
        
        <a href="index.html" class="home-btn">Return to Dashboard</a>
    </div>

</body>
</html>
